<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIMBRE — Asistente MIMBRAL STUDIO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f7f4ef;
      color: #2c2a27;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #2c2a27;
      color: #f7f4ef;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header .logo {
      font-size: 1.25rem;
      font-weight: bold;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    header .subtitle {
      font-size: 0.75rem;
      color: #b5a98a;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7daa6f;
      margin-left: auto;
      flex-shrink: 0;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 78%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .user .bubble {
      background: #2c2a27;
      color: #f7f4ef;
      border-bottom-right-radius: 4px;
    }

    .bot .bubble {
      background: #fff;
      color: #2c2a27;
      border: 1px solid #e0d9cf;
      border-bottom-left-radius: 4px;
    }

    .sender {
      font-size: 0.7rem;
      color: #9e9488;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .typing span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #b5a98a;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    #input-area {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e0d9cf;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      border: 1px solid #d4ccbf;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      background: #f7f4ef;
      line-height: 1.45;
    }

    #input:focus { border-color: #8a7f6e; }

    #send {
      background: #2c2a27;
      color: #f7f4ef;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    #send:hover { background: #46423b; }
    #send:disabled { background: #bbb5aa; cursor: default; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">Mimbral Studio</div>
    <div class="subtitle">Asistente MIMBRE</div>
  </div>
  <div class="dot"></div>
</header>

<div id="chat"></div>

<div id="input-area">
  <textarea id="input" placeholder="Escribe tu consulta…" rows="1"></textarea>
  <button id="send">Enviar</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  const historial = [];

  function addMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `message ${role === 'user' ? 'user' : 'bot'}`;

    const sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = role === 'user' ? 'Tú' : 'Mimbre';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(sender);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'message bot';
    wrap.id = 'typing-indicator';

    const sender = document.createElement('div');
    sender.className = 'sender';
    sender.textContent = 'Mimbre';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(sender);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    historial.push({ role: 'user', content: text });

    addTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ historial })
      });
      const data = await res.json();
      removeTyping();

      if (data.respuesta) {
        addMessage('assistant', data.respuesta);
        historial.push({ role: 'assistant', content: data.respuesta });
      } else {
        addMessage('assistant', 'Lo siento, ha ocurrido un error. Por favor inténtalo de nuevo.');
      }
    } catch {
      removeTyping();
      addMessage('assistant', 'Lo siento, no he podido conectar. Por favor inténtalo de nuevo.');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  sendBtn.addEventListener('click', sendMessage);

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
  });

  // Greeting
  window.addEventListener('load', async () => {
    addTyping();
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ historial: [{ role: 'user', content: 'Hola' }] })
      });
      const data = await res.json();
      removeTyping();
      if (data.respuesta) {
        addMessage('assistant', data.respuesta);
        historial.push({ role: 'user', content: 'Hola' });
        historial.push({ role: 'assistant', content: data.respuesta });
      }
    } catch {
      removeTyping();
    }
  });
</script>

</body>
</html>
